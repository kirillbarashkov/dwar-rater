services:
  postgres:
    build:
      context: .
      dockerfile: Dockerfile.postgres
    container_name: dwar_rater_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dwar_rater}
      POSTGRES_USER: ${POSTGRES_USER:-dwar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - postgres_backups:/backups
    networks:
      - dwar-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dwar_rater_backend
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      SECRET_KEY: ${SECRET_KEY}
      AUTH_ENABLED: "true"
      ADMIN_USER: ${ADMIN_USER}
      ADMIN_PASS: ${ADMIN_PASS}
      RATE_LIMIT_MAX: "100"
      RATE_LIMIT_WINDOW: "60"
      CORS_ORIGINS: ${CORS_ORIGINS}
    networks:
      - dwar-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: dwar_rater_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - dwar-net

volumes:
  postgres_data:
    name: dwar-rater_postgres_data
  postgres_backups:
    name: dwar-rater_postgres_backups

networks:
  dwar-net:
    driver: bridge
