<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dwar Rater — Анализ персонажа</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app">
        <header>
            <h1>⚔️ Dwar Rater</h1>
            <p class="subtitle">Анализ персонажа Легенда: Наследие Драконов</p>
        </header>

        <section id="login-section" class="login-section">
            <div class="login-card">
                <h2>Вход</h2>
                <form id="login-form">
                    <input type="text" id="login-user" placeholder="Логин" required autocomplete="username">
                    <input type="password" id="login-pass" placeholder="Пароль" required autocomplete="current-password">
                    <button type="submit">Войти</button>
                </form>
                <div id="login-error" class="error hidden"></div>
            </div>
        </section>

        <section id="main-section" class="search-section hidden">
            <div class="search-bar">
                <form id="search-form" class="search-form">
                    <div class="input-wrapper">
                        <input type="text" id="url-input" placeholder="Вставьте ссылку на персонажа" required autocomplete="off">
                        <button type="button" id="clear-btn" class="clear-btn" title="Очистить">✕</button>
                    </div>
                    <button type="submit" id="analyze-btn">Анализировать</button>
                </form>
                <button id="logout-btn" class="logout-btn">Выйти</button>
            </div>
            <div id="error-msg" class="error hidden"></div>
        </section>
        <section id="history-section" class="history-section hidden">
            <div class="history-dropdown">
                <div class="history-header">
                    <span>История запросов</span>
                    <span id="history-selected" class="history-selected-label"></span>
                </div>
                <div id="history-list"></div>
            </div>
        </section>

        <div id="loading" class="loading hidden">
            <div class="spinner"></div>
            <p>Загрузка данных персонажа...</p>
        </div>

        <div id="results" class="results hidden">
            <div class="results-actions">
                <button id="save-pdf-btn" class="save-btn">📄 Сохранить в PDF</button>
                <button id="save-html-btn" class="save-btn">🌐 Сохранить в HTML</button>
                <button id="save-db-btn" class="save-btn save-db-btn">💾 Сохранить в БД</button>
            </div>
            <div id="save-db-modal" class="save-db-modal hidden">
                <div class="save-db-modal-content">
                    <h3>Сохранить слепок в БД</h3>
                    <input type="text" id="snapshot-name" placeholder="Наименование слепка" autocomplete="off">
                    <div class="save-db-actions">
                        <button id="confirm-save-db" class="save-btn">Сохранить</button>
                        <button id="cancel-save-db" class="save-btn cancel-btn">Отмена</button>
                    </div>
                </div>
            </div>
            <div id="results-content"></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="/static/app.js"></script>
</body>
</html>
