name: Diagnostic

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action'
        required: true
        default: 'check'
        type: choice
        options:
          - check
          - reset-password
          - set-password
          - fix-schema
      new_password:
        description: 'New password (for set-password only, min 8 chars)'
        required: false
        type: string

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: SSH diagnostic
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 5m
          envs: DIAG_ACTION,DIAG_NEWPASS,ADMIN_PASS
          script: |
            cd ~/dwar-rater
            echo "=== Running _diag.py (action=$DIAG_ACTION) ==="
            docker compose -f docker-compose.prod.yml exec -T -e DIAG_ACTION="$DIAG_ACTION" -e DIAG_NEWPASS="$DIAG_NEWPASS" -e ADMIN_PASS="$ADMIN_PASS" backend python /app/_diag.py 2>&1
            echo ""
            echo "=== Backend logs (tail 25) ==="
            docker compose -f docker-compose.prod.yml logs --tail 25 backend 2>&1 || true
        env:
          DIAG_ACTION: ${{ github.event.inputs.action }}
          DIAG_NEWPASS: ${{ github.event.inputs.new_password }}
          ADMIN_PASS: ${{ secrets.ADMIN_PASS }}