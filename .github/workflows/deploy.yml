name: Deploy to Cloud.ru

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      confirm_deploy:
        description: 'Type "DEPLOY" to confirm production deployment'
        required: true
        type: string

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: dwar
          POSTGRES_PASSWORD: change-me-in-production
          POSTGRES_DB: dwar_rater
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Wait for PostgreSQL
        run: |
          for i in $(seq 1 30); do
            pg_isready -h localhost -p 5432 -U dwar && break
            echo "Waiting for PostgreSQL... ($i)"
            sleep 2
          done

      - name: Backend tests
        env:
          TEST_DATABASE_URL: postgresql://dwar:change-me-in-production@localhost:5432/dwar_rater_test
        run: |
          cd backend
          pip install -r requirements.txt
          python -m pytest -v

  validate-deploy-input:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Confirm deployment
        run: |
          if [ "${{ github.event.inputs.confirm_deploy }}" != "DEPLOY" ]; then
            echo "Deployment cancelled: input must be 'DEPLOY'"
            exit 1
          fi

  deploy:
    needs: [test, validate-deploy-input]
    if: always() && needs.test.result == 'success' && (github.event_name == 'push' || needs.validate-deploy-input.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/dwar-rater
            git pull origin main
            docker compose -f docker-compose.prod.yml up -d --build
            docker image prune -f

      - name: Wait for health check
        run: |
          echo "Waiting for backend to become healthy..."
          for i in $(seq 1 30); do
            if curl -sf "http://${{ secrets.VM_HOST }}:5000/api/health" > /dev/null 2>&1; then
              echo "Backend is healthy!"
              exit 0
            fi
            echo "Waiting... ($i/30)"
            sleep 5
          done
          echo "Health check failed after 150s"
          exit 1

      - name: Create release tag
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          TAG="v${VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" -m "Release ${TAG} (auto-deployed)" || echo "Tag ${TAG} already exists"
          git push origin "${TAG}" || echo "Failed to push tag ${TAG}"

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Deployment failed! Check logs for details."
          echo "Last known good commit: ${{ github.sha }}"
