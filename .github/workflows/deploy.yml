name: Deploy to Cloud.ru

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: dwar
          POSTGRES_PASSWORD: change-me-in-production
          POSTGRES_DB: dwar_rater
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Wait for PostgreSQL
        run: |
          for i in $(seq 1 30); do
            pg_isready -h localhost -p 5432 -U dwar && break
            echo "Waiting for PostgreSQL... ($i)"
            sleep 2
          done

      - name: Backend tests
        env:
          TEST_DATABASE_URL: postgresql://dwar:change-me-in-production@localhost:5432/dwar_rater_test
        run: |
          cd backend
          pip install -r requirements.txt
          python -m pytest -v

      - name: Frontend build & lint
        run: |
          cd frontend
          npm ci
          npm run build
          npm run lint

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/dwar-rater
            git pull origin main
            docker compose -f docker-compose.prod.yml up -d --build
            docker image prune -f
